<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanvas — No-Code Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="//unpkg.com/grapesjs/dist/css/grapes.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//unpkg.com/grapesjs"></script>
    <style>
        :root {
            --bg-app:       #0a0a0b;
            --bg-panel:     #111114;
            --bg-panel-2:   #15151a;
            --bg-canvas:    #1a1a1f;
            --bg-hover:     #1e1e25;
            --bg-active:    #25252e;
            --bg-input:     #18181d;
            --border-soft:  rgba(255,255,255,0.06);
            --border-mid:   rgba(255,255,255,0.09);
            --border-strong:rgba(255,255,255,0.14);
            --text-primary:   #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-tertiary:  #71717a;
            --text-muted:     #52525b;
            --accent:         #7c6ef9;
            --accent-hover:   #8c80fa;
            --accent-dim:     rgba(124,110,249,0.15);
            --accent-border:  rgba(124,110,249,0.35);
            --success:        #22c55e;
            --font-display: 'Syne', sans-serif;
            --font-body:    'DM Sans', system-ui, sans-serif;
            --font-mono:    'JetBrains Mono', monospace;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg-app);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13px;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        button { font-family: inherit; cursor: pointer; }
        input, select, textarea { font-family: inherit; }

        /* ── GrapesJS canvas ── */
        #gjs { border: none; }

        .gjs-cv-canvas {
            top: 0;
            width: 100%;
            height: 100%;
        }

        .gjs-pn-panel { position: relative !important; }

        /* ── GrapesJS dark-theme overrides ── */
        .gjs-one-bg  { background-color: var(--bg-panel)   !important; }
        .gjs-two-bg  { background-color: var(--bg-panel-2) !important; }
        .gjs-three-bg{ background-color: var(--bg-active)  !important; }
        .gjs-four-color { color: var(--accent) !important; }

        .gjs-pn-btn  { color: var(--text-secondary) !important; border-radius: 6px; }
        .gjs-pn-btn:hover { background: var(--bg-hover) !important; color: var(--text-primary) !important; }
        .gjs-pn-active { background: var(--bg-active) !important; color: var(--text-primary) !important; }

        .gjs-block {
            background: var(--bg-panel-2) !important;
            border-color: var(--border-soft) !important;
            color: var(--text-secondary) !important;
            border-radius: 8px !important;
            transition: background 0.14s, border-color 0.14s !important;
        }
        .gjs-block:hover {
            background: var(--bg-hover) !important;
            border-color: var(--border-strong) !important;
            transform: translateY(-1px);
        }

        .gjs-block-label { color: var(--text-secondary) !important; font-size: 11px !important; }
        .gjs-blocks-cs   { background: transparent !important; }
        .gjs-blocks-no-cat .gjs-blocks-c { background: transparent !important; }

        .gjs-sm-sector-title,
        .gjs-clm-header,
        .gjs-layer-title-c { background: var(--bg-panel-2) !important; color: var(--text-secondary) !important; }

        .gjs-sm-property { color: var(--text-secondary) !important; }
        .gjs-field        { background: var(--bg-input) !important; border-color: var(--border-soft) !important; color: var(--text-primary) !important; border-radius: 6px !important; }
        .gjs-field:focus  { border-color: var(--accent-border) !important; }

        .gjs-layer        { background: var(--bg-panel-2) !important; border-color: var(--border-soft) !important; color: var(--text-secondary) !important; }
        .gjs-layer:hover  { background: var(--bg-hover) !important; }
        .gjs-layer.gjs-selected { background: var(--bg-active) !important; color: var(--text-primary) !important; }

        .gjs-clm-tag      { background: var(--accent-dim) !important; color: var(--accent) !important; border-color: var(--accent-border) !important; border-radius: 4px !important; }
        .gjs-sm-sector    { border-color: var(--border-soft) !important; }
        .gjs-sm-sector .gjs-sm-sector-title { border-color: var(--border-soft) !important; }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar              { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track        { background: transparent; }
        ::-webkit-scrollbar-thumb        { background: rgba(255,255,255,0.08); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover  { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>

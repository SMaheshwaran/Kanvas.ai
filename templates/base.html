<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Kanvas AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='4' y='22' font-family='sans-serif' font-weight='700' font-size='14' fill='%237c6ef9'>K</text><text x='15' y='22' font-family='sans-serif' font-weight='400' font-size='10' fill='%23ffffff'>.ai</text></svg>">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
    <style>
*{box-sizing:border-box;}
.site-nav{position:fixed;top:0;left:0;width:100%;padding:14px 48px;z-index:200;display:flex;align-items:center;background:rgba(12,12,16,0.72);border-bottom:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);box-shadow:0 1px 24px rgba(0,0,0,0.28);}
.nav-brand{flex:1;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:#fff;text-decoration:none;white-space:nowrap;}
.nav-brand span{color:#7c6ef9;}
.site-nav .nav-links{display:flex;gap:32px;list-style:none;flex:0 0 auto;}
.site-nav .nav-links a{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:rgba(255,255,255,0.52);text-decoration:none;text-transform:uppercase;letter-spacing:1.5px;transition:color 0.2s;}
.site-nav .nav-links a:hover{color:rgba(255,255,255,0.9);}
.nav-right{flex:1;display:flex;justify-content:flex-end;}
.nav-cta{background:#7c6ef9;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;white-space:nowrap;margin-left:8px;transition:background 0.2s;}
.nav-cta:hover{background:#9080fb;}
.kv-footer{background:#080809;border-top:1px solid rgba(255,255,255,0.06);padding:24px 0;}
.kv-footer-inner{width:100%;max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.kv-footer-brand{display:flex;align-items:center;gap:12px;text-decoration:none;}
.kv-footer-brand-name{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;}
.kv-footer-brand-name span{color:#7c6ef9;}
.kv-footer-copy{font-family:'DM Sans',sans-serif;font-size:12px;color:#3f3f46;}
@media(max-width:768px){.site-nav .nav-links{display:none;}.site-nav{padding:12px 20px;}}
    </style>
</head>

<body>
    <!-- Preloader -->
    <div class="preloader d-flex align-items-center justify-content-center">
        <div class="lds-ellipsis"><div></div><div></div><div></div><div></div></div>
    </div>

    <!-- Header -->
    <nav class="site-nav" id="siteNav">
        <a href="{% url 'home' %}" class="nav-brand">Kanvas<span>AI</span></a>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'addpage' %}">Build Page</a></li>
            <li><a href="{% url 'view_pages' %}">My Pages</a></li>
            <li><a href="{% url 'autogenerate' %}">Generate</a></li>
            <li><a href="{% url 'Error_Solver' %}">Code Tools</a></li>
        </ul>
        <div class="nav-right">
            <a href="{% url 'addpage' %}" class="nav-cta">Start Building</a>
        </div>
    </nav>


    {% block content %}
    {% endblock %}


<!-- Footer -->
<footer class="kv-footer">
    <div class="kv-footer-inner">
        <a href="{% url 'home' %}" class="kv-footer-brand">
            <span class="kv-footer-brand-name">Kanvas<span>AI</span></span>
            <span class="kv-footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> Kanvas AI</span>
        </a>
    </div>
</footer>
    <!-- ##### All Javascript Script ##### -->
    <!-- jQuery-2.2.4 js -->
    <script src=" {% static 'js/jquery/jquery-2.2.4.min.js' %} "></script>
    <!-- Popper js -->
    <script src=" {% static 'js/bootstrap/popper.min.js' %} "></script>
    <!-- Bootstrap js -->
    <script src=" {% static 'js/bootstrap/bootstrap.min.js' %} "></script>
    <!-- All Plugins js -->
    <script src=" {% static 'js/plugins/plugins.js' %} "></script>
    <!-- Active js -->
    <script src=" {% static 'js/active.js' %} "></script>
</body>

</html>
